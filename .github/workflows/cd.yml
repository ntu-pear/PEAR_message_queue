# This workflow will build and deploy RabbitMQ message queue service
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: RabbitMQ Message Queue CD

on:
  push:
    branches: ["main", "staging"]

permissions:
  contents: read

jobs:
  deploy-staging:
    if: github.ref == 'refs/heads/staging'
    runs-on: [self-hosted, Linux, X64]
    
    steps:
      - uses: actions/checkout@v4
        with:
          ref: staging
      
      - name: Pre-deployment setup
        run: |
          echo "🚀 Starting RabbitMQ deployment to STAGING"
          echo "Current time: $(date)"
          echo "Branch: staging"
      
      - name: Build and push new image
        run: |
          echo "🔨 Building new RabbitMQ image for STAGING..."
          docker build --no-cache -f Dockerfile -t rabbitmq_service_dev .
          docker tag rabbitmq_service_dev:latest localhost:5000/rabbitmq_service_dev:latest
          docker push localhost:5000/rabbitmq_service_dev:latest
          sleep 5
      
      - name: Rolling update instead of recreation
        run: |
          echo "🔄 Performing rolling update of RabbitMQ STAGING..."
          
          if kubectl get statefulset rabbitmq-stg &> /dev/null; then
            echo "Existing RabbitMQ found - performing rolling update"
            
            # Configure rolling update strategy
            kubectl patch statefulset rabbitmq-stg -p '{
              "spec": {
                "updateStrategy": {
                  "type": "RollingUpdate",
                  "rollingUpdate": {"partition": 0}
                }
              }
            }'
            
            # Update the image
            kubectl set image statefulset/rabbitmq-stg rabbitmq=host.minikube.internal:5000/rabbitmq_service_dev:latest

            kubectl patch statefulset rabbitmq-stg -p "{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"kubectl.kubernetes.io/restartedAt\":\"$(date -Is)\"}}}}}"
            
            echo "Rolling update initiated - pods will restart one by one"
            
          else
            echo "No existing RabbitMQ - deploying fresh"
            kubectl apply -f k8s/deployment-stg.yaml
          fi
      
      - name: Monitor rolling update
        run: |
          echo "⏳ Monitoring rolling update progress..."
          
          # Wait for rolling update to complete
          kubectl rollout status statefulset/rabbitmq-stg --timeout=300s
          
          echo "✅ Rolling update completed"
      
      - name: Wait for RabbitMQ to stabilize
        run: |
          echo "🔍 Waiting for RabbitMQ to stabilize..."
          
          # Wait for all pods to be ready
          kubectl wait --for=condition=ready pod -l app=rabbitmq-stg --timeout=300s
          
          # Additional wait for RabbitMQ cluster to form
          sleep 60
          
          echo "🏥 Verifying RabbitMQ health..."
          kubectl exec -l app=rabbitmq-stg -- rabbitmq-diagnostics status || echo "Health check completed"

  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, Linux, X64]
    
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      
      - name: Pre-deployment setup
        run: |
          echo "🚀 Starting RabbitMQ deployment to PRODUCTION"
          echo "Current time: $(date)"
          echo "Branch: main"
      
      - name: Build and push new image
        run: |
          echo "🔨 Building new RabbitMQ image for PRODUCTION..."
          docker build --no-cache -f Dockerfile -t rabbitmq_service_prod .
          docker tag rabbitmq_service_prod:latest localhost:5000/rabbitmq_service_prod:latest
          docker push localhost:5000/rabbitmq_service_prod:latest
          sleep 5
      
      - name: Rolling update instead of recreation
        run: |
          echo "🔄 Performing rolling update of RabbitMQ PRODUCTION..."
          
          if kubectl get statefulset rabbitmq-prod &> /dev/null; then
            echo "Existing RabbitMQ found - performing rolling update"
            
            # Configure rolling update strategy
            kubectl patch statefulset rabbitmq-prod -p '{
              "spec": {
                "updateStrategy": {
                  "type": "RollingUpdate",
                  "rollingUpdate": {"partition": 0}
                }
              }
            }'
            
            # Update the image
            kubectl set image statefulset/rabbitmq-prod rabbitmq=host.minikube.internal:5000/rabbitmq_service_prod:latest

            kubectl patch statefulset rabbitmq-prod -p "{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"kubectl.kubernetes.io/restartedAt\":\"$(date -Is)\"}}}}}"
            
            echo "Rolling update initiated - pods will restart one by one"
            
          else
            echo "No existing RabbitMQ - deploying fresh"
            kubectl apply -f k8s/deployment-prod.yaml
          fi
      
      - name: Monitor rolling update
        run: |
          echo "⏳ Monitoring rolling update progress..."
          
          # Wait for rolling update to complete
          kubectl rollout status statefulset/rabbitmq-prod --timeout=300s
          
          echo "✅ Rolling update completed"
      
      - name: Wait for RabbitMQ to stabilize
        run: |
          echo "🔍 Waiting for RabbitMQ to stabilize..."
          
          # Wait for all pods to be ready
          kubectl wait --for=condition=ready pod -l app=rabbitmq-prod --timeout=300s
          
          # Additional wait for RabbitMQ cluster to form
          sleep 60
          
          echo "🏥 Verifying RabbitMQ health..."
          kubectl exec -l app=rabbitmq-prod -- rabbitmq-diagnostics status || echo "Health check completed"
